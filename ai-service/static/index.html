<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Doctor Booking — Voice</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#273347;--border:#334155;
  --accent:#3b82f6;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --text:#f1f5f9;--muted:#94a3b8;--radius:14px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 32px}

/* ── Header ── */
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:1.4rem;font-weight:700;letter-spacing:-.5px}
.header p{color:var(--muted);font-size:.8rem;margin-top:3px}

/* ── Top bar ── */
.top-bar{width:100%;max-width:680px;display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.hospital-select{flex:1;min-width:200px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.85rem;outline:none;cursor:pointer}
.lang-pills{display:flex;gap:6px}
.lang-btn{padding:6px 13px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:.78rem;transition:all .15s}
.lang-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.12)}

/* ── Doctor cards strip ── */
.doctor-strip{width:100%;max-width:680px;display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;scrollbar-width:none}
.doctor-strip::-webkit-scrollbar{display:none}
.doc-card{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:170px;cursor:pointer;transition:border-color .15s}
.doc-card:hover{border-color:var(--accent)}
.doc-card .doc-name{font-size:.82rem;font-weight:600;line-height:1.3}
.doc-card .doc-dept{font-size:.73rem;color:var(--accent);margin-top:2px}
.doc-card .doc-fee{font-size:.72rem;color:var(--muted);margin-top:3px}

/* ── Chat area ── */
.chat-wrap{width:100%;max-width:680px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;min-height:320px;max-height:460px}

/* ── Stage badge ── */
.stage-badge{align-self:center;font-size:.72rem;padding:4px 12px;border-radius:99px;border:1px solid var(--border);color:var(--muted);background:var(--surface2)}

/* ── Messages ── */
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0}
.msg.assistant .msg-avatar{background:rgba(59,130,246,.25);color:var(--accent)}
.msg.user .msg-avatar{background:rgba(34,197,94,.2);color:var(--green)}
.msg-body{max-width:82%;display:flex;flex-direction:column;gap:6px}
.msg.user .msg-body{align-items:flex-end}
.msg-bubble{padding:10px 13px;border-radius:12px;font-size:.875rem;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.msg.assistant .msg-bubble{background:var(--surface2);border-bottom-left-radius:4px}
.msg.user .msg-bubble{background:rgba(59,130,246,.2);border-bottom-right-radius:4px}
.msg-meta{font-size:.7rem;color:var(--muted)}

/* ── Booking card inside chat ── */
.booking-card{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:10px 14px;font-size:.82rem;line-height:1.6}
.booking-card .bc-title{font-weight:700;color:var(--green);margin-bottom:6px;font-size:.85rem}
.booking-card .bc-row{display:flex;gap:6px}
.booking-card .bc-label{color:var(--muted);min-width:80px}

/* ── Doctor info card inside chat ── */
.doc-info-card{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.25);border-radius:10px;padding:10px 14px;font-size:.82rem;line-height:1.6;margin-top:4px}
.doc-info-card .di-name{font-weight:700;color:var(--accent);font-size:.88rem}
.doc-info-card .di-row{display:flex;gap:6px;margin-top:2px}
.doc-info-card .di-label{color:var(--muted);min-width:70px}

/* ── Play button ── */
.play-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.73rem;cursor:pointer;margin-top:2px;transition:all .15s}
.play-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Typing indicator ── */
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px;background:var(--surface2);border-radius:12px;border-bottom-left-radius:4px;width:fit-content}
.typing span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── Controls ── */
.controls{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);align-items:center}
.mic-btn{width:42px;height:42px;border-radius:50%;border:none;background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.mic-btn:hover:not(:disabled){background:rgba(59,130,246,.2)}
.mic-btn.recording{background:rgba(239,68,68,.25);color:var(--red);animation:pulse 1s infinite}
.mic-btn:disabled{opacity:.4;cursor:not-allowed}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.text-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 13px;color:var(--text);font-size:.875rem;outline:none}
.text-input:focus{border-color:var(--accent)}
.text-input:disabled{opacity:.4}
.send-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.send-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── Mic level ── */
.mic-level{width:100%;max-width:680px;height:3px;background:var(--surface2);border-radius:99px;margin-top:6px;overflow:hidden}
.mic-level-bar{height:100%;width:0;background:var(--accent);transition:width .1s}

/* ── Status ── */
.status-bar{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:.8rem;color:var(--muted)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.status-dot.ok{background:var(--green)}
.status-dot.busy{background:var(--amber);animation:pulse 1s infinite}
.status-dot.err{background:var(--red)}

/* ── Action row ── */
.action-row{display:flex;gap:10px;margin-top:14px}
.action-btn{padding:10px 22px;border-radius:10px;font-size:.875rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.action-btn.primary{background:var(--accent);color:#fff}
.action-btn.primary:hover{background:#2563eb}
.action-btn.ghost{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.action-btn.ghost:hover{border-color:var(--accent);color:var(--text)}
.action-btn:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>

<div class="header">
  <h1>🏥 AI Doctor Booking</h1>
  <p>Voice-powered appointment system — বাংলা / English / हिंदी</p>
</div>

<!-- Top bar: hospital + language -->
<div class="top-bar">
  <select id="hospital-select" class="hospital-select">
    <option value="">— All Hospitals —</option>
  </select>
  <div class="lang-pills">
    <button class="lang-btn active" data-lang="bn">বাংলা</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="hi">हि</button>
  </div>
</div>

<!-- Doctor quick-select strip -->
<div class="doctor-strip" id="doctor-strip" style="display:none"></div>

<!-- Chat -->
<div class="chat-wrap">
  <div class="chat-messages" id="messages">
    <div id="welcome" style="text-align:center;padding:40px 20px;color:var(--muted)">
      <div style="font-size:2.5rem;margin-bottom:12px">🎤</div>
      <strong style="color:var(--text)">শুরু করতে Start চাপুন</strong>
      <p style="margin-top:6px;font-size:.85rem">একটি হাসপাতাল বেছে নিন, তারপর কথা বলুন বা টাইপ করুন।</p>
    </div>
  </div>

  <div class="controls">
    <button class="mic-btn" id="mic-btn" disabled title="Hold to record">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <input type="text" class="text-input" id="text-input" placeholder="বার্তা লিখুন… বা মাইক ধরুন" disabled/>
    <button class="send-btn" id="send-btn" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<div class="mic-level"><div class="mic-level-bar" id="mic-level-bar"></div></div>

<div class="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">হাসপাতাল বেছে নিন, তারপর Start চাপুন</span>
</div>

<div class="action-row">
  <button class="action-btn primary" id="start-btn">▶ কথোপকথন শুরু করুন</button>
  <button class="action-btn ghost" id="reset-btn" disabled>↺ রিসেট</button>
</div>

<script>
const API = '';
let sessionId = null, lang = 'bn', mediaRecorder = null;
let audioChunks = [], isRecording = false, isBusy = false;
let micStream = null, analyser = null, animFrame = null, currentAudio = null;
let currentDoctors = [];

const $ = id => document.getElementById(id);
const messagesEl = $('messages'), micBtn = $('mic-btn'), textInput = $('text-input');
const sendBtn = $('send-btn'), startBtn = $('start-btn'), resetBtn = $('reset-btn');
const statusDot = $('status-dot'), statusText = $('status-text');
const micLevelBar = $('mic-level-bar'), hospitalSelect = $('hospital-select');
const doctorStrip = $('doctor-strip');

// ── Load hospitals from API ──────────────────────────────────────────────────
async function loadHospitals() {
  try {
    const res = await fetch(`${API}/api/hospitals`);
    const data = await res.json();
    data.hospitals.forEach(h => {
      const opt = document.createElement('option');
      opt.value = h.id;
      opt.textContent = h.name + (h.city ? ` — ${h.city}` : '');
      hospitalSelect.appendChild(opt);
    });
  } catch(e) { console.warn('Could not load hospitals', e); }
}
loadHospitals();

// ── Language selector ────────────────────────────────────────────────────────
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    lang = btn.dataset.lang;
  });
});

// ── Doctor strip ─────────────────────────────────────────────────────────────
function renderDoctorStrip(doctors) {
  currentDoctors = doctors || [];
  doctorStrip.innerHTML = '';
  if (!currentDoctors.length) { doctorStrip.style.display = 'none'; return; }
  doctorStrip.style.display = 'flex';
  currentDoctors.forEach(doc => {
    const card = document.createElement('div');
    card.className = 'doc-card';
    card.innerHTML = `
      <div class="doc-name">${doc.title || ''} ${doc.name}</div>
      <div class="doc-dept">${doc.department || ''}</div>
      <div class="doc-fee">৳${doc.consultation_fee || '—'} / visit</div>
    `;
    card.addEventListener('click', () => {
      if (!sessionId) return;
      const msg = lang === 'bn'
        ? `${doc.title} ${doc.name}-এর কাছে অ্যাপয়েন্টমেন্ট নিতে চাই`
        : `I want to book with ${doc.title} ${doc.name}`;
      textInput.value = msg;
      sendText();
    });
    doctorStrip.appendChild(card);
  });
}

// ── Status helpers ───────────────────────────────────────────────────────────
function setStatus(type, text) {
  statusDot.className = 'status-dot' + (type ? ' ' + type : '');
  statusText.textContent = text;
}

function setBusy(on) {
  isBusy = on;
  micBtn.disabled = on || !sessionId;
  textInput.disabled = on || !sessionId;
  sendBtn.disabled = on || !sessionId;
}

function enableControls(on) {
  micBtn.disabled = !on;
  textInput.disabled = !on;
  sendBtn.disabled = !on;
}

// ── Stage label ───────────────────────────────────────────────────────────────
const STAGE_LABELS = {
  greeting: '👋 স্বাগত',
  intent_detection: '🔍 উদ্দেশ্য বোঝা হচ্ছে',
  doctor_selection: '👨‍⚕️ ডাক্তার নির্বাচন',
  date_selection: '📅 তারিখ নির্বাচন',
  patient_info: '📋 রোগীর তথ্য',
  confirmation: '✅ নিশ্চিতকরণ',
  completed: '🎉 সম্পন্ন',
};
function addStageBadge(stage) {
  if (!stage) return;
  const badge = document.createElement('div');
  badge.className = 'stage-badge';
  badge.textContent = STAGE_LABELS[stage] || stage;
  messagesEl.appendChild(badge);
}

// ── Typing indicator ──────────────────────────────────────────────────────────
let typingEl = null;
function showTyping() {
  typingEl = document.createElement('div');
  typingEl.className = 'msg assistant';
  typingEl.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(typingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping() { typingEl?.remove(); typingEl = null; }

// ── Message rendering ─────────────────────────────────────────────────────────
function appendMessage(role, text, audioB64, extra = {}) {
  $('welcome')?.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'assistant' ? 'AI' : 'You';

  const body = document.createElement('div');
  body.className = 'msg-body';

  // Main bubble
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  body.appendChild(bubble);

  // Transcript pill for voice input
  if (role === 'user' && extra.transcript) {
    const pill = document.createElement('div');
    pill.className = 'msg-meta';
    pill.textContent = '🎤 ' + extra.transcript;
    body.appendChild(pill);
  }

  // Doctor info card
  if (role === 'assistant' && extra.doctors && extra.doctors.length > 0) {
    extra.doctors.slice(0, 3).forEach(doc => {
      const card = document.createElement('div');
      card.className = 'doc-info-card';
      card.innerHTML = `
        <div class="di-name">${doc.title || ''} ${doc.name}</div>
        ${doc.department ? `<div class="di-row"><span class="di-label">বিভাগ:</span>${doc.department}</div>` : ''}
        ${doc.consultation_fee ? `<div class="di-row"><span class="di-label">ফি:</span>৳${doc.consultation_fee}</div>` : ''}
        ${doc.hospital_name ? `<div class="di-row"><span class="di-label">হাসপাতাল:</span>${doc.hospital_name}</div>` : ''}
        ${doc.schedules && doc.schedules.length ? `<div class="di-row"><span class="di-label">সময়:</span>${doc.schedules.map(s=>`${s.day} ${s.start}–${s.end}`).join(', ')}</div>` : ''}
      `;
      body.appendChild(card);
    });
  }

  // Booking confirmation card
  if (role === 'assistant' && extra.booking) {
    const b = extra.booking;
    const card = document.createElement('div');
    card.className = 'booking-card';
    card.innerHTML = `
      <div class="bc-title">✅ অ্যাপয়েন্টমেন্ট নিশ্চিত!</div>
      ${b.serial_number ? `<div class="bc-row"><span class="bc-label">সিরিয়াল:</span><strong>#${b.serial_number}</strong></div>` : ''}
      ${b.doctor_name ? `<div class="bc-row"><span class="bc-label">ডাক্তার:</span>${b.doctor_name}</div>` : ''}
      ${b.appointment_date ? `<div class="bc-row"><span class="bc-label">তারিখ:</span>${b.appointment_date}</div>` : ''}
      ${b.patient_name ? `<div class="bc-row"><span class="bc-label">রোগী:</span>${b.patient_name}</div>` : ''}
      ${b.appointment_ref ? `<div class="bc-row"><span class="bc-label">Ref:</span>${b.appointment_ref}</div>` : ''}
    `;
    body.appendChild(card);
  }

  // Play again button
  if (role === 'assistant' && audioB64) {
    const playBtn = document.createElement('button');
    playBtn.className = 'play-btn';
    playBtn.innerHTML = '▶ আবার শুনুন';
    playBtn.onclick = () => { playBtn.textContent = '▶ চলছে…'; playAudio(audioB64); setTimeout(() => playBtn.innerHTML = '▶ আবার শুনুন', 3000); };
    body.appendChild(playBtn);
  }

  div.appendChild(avatar);
  div.appendChild(body);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── Audio playback ────────────────────────────────────────────────────────────
function playAudio(b64) {
  if (!b64) return;
  currentAudio?.pause();
  const bytes = atob(b64);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  const url = URL.createObjectURL(new Blob([arr], {type:'audio/mpeg'}));
  currentAudio = new Audio(url);
  currentAudio.play().catch(() => {});
  currentAudio.onended = () => URL.revokeObjectURL(url);
}

// ── Start conversation ────────────────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  if (sessionId) return;
  const hospitalId = hospitalSelect.value ? parseInt(hospitalSelect.value) : null;
  hospitalSelect.disabled = true;
  startBtn.disabled = true;
  setStatus('busy', 'সংযোগ হচ্ছে…');
  showTyping();
  try {
    const res = await fetch(`${API}/api/conversation/start`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({language: lang, hospital_id: hospitalId}),
    });
    const data = await res.json();
    hideTyping();
    sessionId = data.session_id;

    // Show doctor strip
    if (data.doctors && data.doctors.length) renderDoctorStrip(data.doctors);

    // Greeting message
    appendMessage('assistant', data.greeting, data.audio_base64,
      data.doctors && data.doctors.length ? {doctors: data.doctors} : {});
    playAudio(data.audio_base64);

    addStageBadge('doctor_selection');
    setStatus('ok', 'সংযুক্ত — কথা বলুন বা টাইপ করুন');
    enableControls(true);
    resetBtn.disabled = false;
    textInput.focus();
  } catch(e) {
    hideTyping();
    setStatus('err', 'সংযোগ ব্যর্থ: ' + e.message);
    startBtn.disabled = false;
    hospitalSelect.disabled = false;
  }
});

// ── Reset ─────────────────────────────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
  if (sessionId) fetch(`${API}/api/conversation/${sessionId}`, {method:'DELETE'}).catch(()=>{});
  sessionId = null;
  messagesEl.innerHTML = `<div id="welcome" style="text-align:center;padding:40px 20px;color:var(--muted)">
    <div style="font-size:2.5rem;margin-bottom:12px">🎤</div>
    <strong style="color:var(--text)">শুরু করতে Start চাপুন</strong>
    <p style="margin-top:6px;font-size:.85rem">একটি হাসপাতাল বেছে নিন, তারপর কথা বলুন বা টাইপ করুন।</p>
  </div>`;
  doctorStrip.style.display = 'none';
  doctorStrip.innerHTML = '';
  enableControls(false);
  startBtn.disabled = false;
  resetBtn.disabled = true;
  hospitalSelect.disabled = false;
  setStatus('', 'হাসপাতাল বেছে নিন, তারপর Start চাপুন');
  currentAudio?.pause();
});

// ── Text send ─────────────────────────────────────────────────────────────────
sendBtn.addEventListener('click', sendText);
textInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); } });

async function sendText() {
  const msg = textInput.value.trim();
  if (!msg || !sessionId || isBusy) return;
  textInput.value = '';
  appendMessage('user', msg);
  await doTurn(msg);
}

async function doTurn(userText, isVoice = false, transcript = '') {
  setBusy(true);
  showTyping();
  setStatus('busy', 'AI ভাবছে…');
  try {
    const res = await fetch(`${API}/api/conversation/turn`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        session_id: sessionId,
        message: userText,
        hospital_id: hospitalSelect.value ? parseInt(hospitalSelect.value) : null,
      }),
    });
    if (!res.ok) { const t = await res.text(); throw new Error(t.slice(0,120)); }
    const data = await res.json();
    hideTyping();

    // Stage badge
    addStageBadge(data.stage);

    // Build extras
    const extras = {};
    if (transcript) extras.transcript = transcript;
    if (data.context?.doctors) extras.doctors = data.context.doctors;
    if (data.appointment) extras.booking = data.appointment;

    appendMessage('assistant', data.response_text, data.audio_base64, extras);
    playAudio(data.audio_base64);
    setStatus('ok', 'সংযুক্ত — পরবর্তী বার্তা দিন');
  } catch(e) {
    hideTyping();
    appendMessage('assistant', '⚠️ ত্রুটি: ' + e.message);
    setStatus('err', 'ত্রুটি হয়েছে');
  } finally {
    setBusy(false);
  }
}

// ── Voice recording ───────────────────────────────────────────────────────────
micBtn.addEventListener('mousedown', startRecording);
micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, {passive:false});
micBtn.addEventListener('mouseup', stopRecording);
micBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); }, {passive:false});

function getSupportedMimeType() {
  for (const t of ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

async function startRecording() {
  if (isRecording || isBusy || !sessionId) return;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(micStream);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    drawMicLevel();

    const mimeType = getSupportedMimeType();
    const opts = mimeType ? {mimeType} : {};
    mediaRecorder = new MediaRecorder(micStream, opts);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(250);
    isRecording = true;
    micBtn.classList.add('recording');
    setStatus('busy', '🔴 রেকর্ড হচ্ছে… ছেড়ে দিন');
  } catch(e) {
    setStatus('err', 'মাইক অ্যাক্সেস দিন: ' + e.message);
  }
}

async function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  micBtn.classList.remove('recording');
  cancelAnimationFrame(animFrame);
  micLevelBar.style.width = '0';
  mediaRecorder.stop();
  micStream?.getTracks().forEach(t => t.stop());
  mediaRecorder.onstop = async () => {
    const mimeType = mediaRecorder.mimeType || 'audio/webm';
    const blob = new Blob(audioChunks, {type: mimeType});
    await sendAudio(blob);
  };
}

async function sendAudio(blob) {
  setBusy(true);
  setStatus('busy', '🎤 ট্রান্সক্রাইব হচ্ছে…');
  showTyping();
  try {
    const form = new FormData();
    form.append('audio', blob, 'audio.webm');
    form.append('session_id', sessionId);
    form.append('hospital_id', hospitalSelect.value || '');
    form.append('language', lang);

    const res = await fetch(`${API}/api/conversation/audio-turn`, {method:'POST', body:form});
    if (!res.ok) { const t = await res.text(); throw new Error(t.slice(0,120)); }
    const data = await res.json();
    hideTyping();

    if (data.transcript) appendMessage('user', data.transcript);
    addStageBadge(data.stage);

    const extras = {};
    if (data.context?.doctors) extras.doctors = data.context.doctors;
    if (data.appointment) extras.booking = data.appointment;

    appendMessage('assistant', data.response_text, data.audio_base64, extras);
    playAudio(data.audio_base64);
    setStatus('ok', 'সংযুক্ত — পরবর্তী বার্তা দিন');
  } catch(e) {
    hideTyping();
    appendMessage('assistant', '⚠️ ভয়েস প্রক্রিয়া ব্যর্থ: ' + e.message);
    setStatus('err', 'ত্রুটি হয়েছে');
  } finally {
    setBusy(false);
  }
}

function drawMicLevel() {
  const data = new Uint8Array(analyser?.frequencyBinCount || 0);
  analyser?.getByteFrequencyData(data);
  const avg = data.reduce((a,b) => a+b, 0) / (data.length || 1);
  micLevelBar.style.width = Math.min(100, avg * 1.2) + '%';
  animFrame = requestAnimationFrame(drawMicLevel);
}
</script>
